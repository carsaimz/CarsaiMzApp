name: Release
on:
  push:
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: 8.6 }
      - run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease
      - uses: softprops/action-gh-release@v2
        with:
          name: CarsaiMz ${{ github.ref_name }}
          files: app/build/outputs/apk/release/app-release.apk
          body: "CarsaiMz ${{ github.ref_name }} — CarsaiDev | CarsaiMz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: always()
        run: rm -f release.jks
